<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Integración Continua en AzureDevops</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #312e81);
            position: relative;
            color: white;
        }

        /* Fondo con patrón */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(rgba(255,255,255,.06) 1px, transparent 1px);
            background-size: 35px 35px;
            opacity: .5;
        }

        /* Aurora Boreal */
        .aurora {
            position: absolute;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: .45;
            animation: float 12s ease-in-out infinite alternate;
        }

        .aurora.one {
            background: #00f5d4;
            top: -250px;
            left: -180px;
        }

        .aurora.two {
            background: #7b2cbf;
            bottom: -250px;
            right: -180px;
            animation-delay: 2s;
        }

        @keyframes float {
            from {
                transform: translateY(-30px) translateX(-20px);
            }
            to {
                transform: translateY(30px) translateX(20px);
            }
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,.2);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            width: min(90%, 700px);
            box-shadow: 0 20px 60px rgba(0,0,0,.35);
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            line-height: 1.2;
            margin-bottom: 20px;
            background: linear-gradient(90deg,#ffffff,#7dd3fc,#67e8f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: clamp(1.1rem, 2.8vw, 1.6rem);
            font-weight: 400;
            color: #dbeafe;
            margin-bottom: 35px;
        }

        .badge {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 999px;
            background: linear-gradient(90deg,#06b6d4,#8b5cf6);
            color: white;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 8px 25px rgba(0,0,0,.25);
        }

        footer {
            margin-top: 35px;
            font-size: .9rem;
            color: rgba(255,255,255,.8);
        }

        @media (max-width: 600px) {
            .card {
                padding: 35px 25px;
            }
        }
    </style>
</head>
<body>

    <div class="aurora one"></div>
    <div class="aurora two"></div>

    <main class="card">
        <h1>Prueba de Integración Continua en AzureDevops</h1>

        <h2>Created by <strong>Sandy Murillo</strong></h2>

        <div class="badge">
            🚀 Azure DevOps CI/CD Demo
        </div>

        <footer>
            Diseño moderno • Responsive • HTML + CSS
        </footer>
    </main>

</body>
</html>
